<!DOCTYPE html>
<html lang="es">
<head>

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #ffffff;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 480px;
      padding: 2rem 1.5rem;
      text-align: center;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      width: 140px;
      height: auto;
      margin: 0 auto 2rem;
      border-radius: 20px;
      object-fit: contain;
      filter: drop-shadow(0 0 20px rgba(62, 189, 126, 0.25));
    }

    h1 {
      font-size: 1.45rem;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 1.5rem;
    }

    .tagline {
      color: #a0a0a0;
      font-size: 0.85rem;
      font-weight: 400;
      margin-bottom: 1.5rem;
    }

    .instruction {
      font-size: 0.9rem;
      color: #cccccc;
      margin-bottom: 1rem;
    }

    #niches {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .niche-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      min-height: 52px;
      padding: 0.85rem 1.25rem;
      color: #ffffff;
      text-decoration: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      transition: filter 0.2s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .niche-btn:hover {
      filter: brightness(1.1);
    }

    .niche-btn:active {
      transform: scale(0.97);
    }

    .niche-btn .wa-icon {
      flex-shrink: 0;
    }

    .niche-btn .arrow {
      color: rgba(255, 255, 255, 0.7);
      font-weight: 400;
    }

    .footer-text {
      color: #666;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="logo.png" alt="Bloom Automations" class="logo">

    <h1>Deja de gestionar citas.<br>Tus clientes reservan solos en WhatsApp.</h1>
    <p class="tagline">Sin apps, sin páginas externas — en menos de 1 minuto</p>
    <p class="instruction">Elige tu profesión y prueba el sistema:</p>
    <div id="niches"></div>
    <p class="footer-text">Vive la experiencia que tendrían tus clientes</p>
  </div>

  <script>
    // WhatsApp SVG icon (inline, 20x20)
    var WA_ICON = '<svg class="wa-icon" width="20" height="20" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>';

    // ============================================================
    // NICHE CONFIGURATION
    // To add a new niche, just add a new object to this array.
    // Each niche gets its own button color for visual distinction.
    // ============================================================
    var NICHES = [
      {
        emoji: "💈",
        label: "Soy Barbero",
        whatsapp_link: "https://wa.me/5216145993425?text=Hola%2C%20soy%20barbero%20y%20quiero%20probar%20el%20sistema",
        ga_event_label: "barberia",
        color: "#25D366"
      },
      {
        emoji: "🩺",
        label: "Soy Doctor",
        whatsapp_link: "https://wa.me/5216145993425?text=Hola%2C%20soy%20doctor%20y%20quiero%20probar%20el%20sistema",
        ga_event_label: "doctor",
        color: "#2D9CDB"
      }
    ];

    // Render buttons
    var container = document.getElementById('niches');
    NICHES.forEach(function(niche) {
      var a = document.createElement('a');
      a.href = niche.whatsapp_link;
      a.target = '_blank';
      a.rel = 'noopener';
      a.className = 'niche-btn';
      a.style.background = niche.color;
      a.innerHTML = niche.emoji + ' ' + niche.label + ' <span class="arrow">&rarr;</span> ' + WA_ICON;
      a.addEventListener('click', function() {
        // GA4 event
        if (typeof gtag === 'function') {
          gtag('event', 'whatsapp_click', {
            event_category: 'engagement',
            event_label: niche.ga_event_label
          });
        }
        // Meta Pixel event
        if (typeof fbq === 'function') {
          fbq('track', 'Lead', { content_name: niche.ga_event_label });
        }
      });
      container.appendChild(a);
    });
  </script>
</body>
</html>
